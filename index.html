<!--* SOUND WAVE COMPLETE VERSION -->

<div class="container">
  <div class="box data-tilt">
    <div class="text">
      <h2>@cyberMusic</h2>
      <h1></h1>
      <div class="seconds">
        <i class="fa-solid volume fa-volume-off"></i>
        <span id="time-total"></span>
      </div>
      <div class="seconds">
        <i class="fa-solid fa-play"></i>
        <span id="time-current">0 : 00</span>
      </div>
    </div>
    <div class="track">
      <div class="playBtn"></div>
      <div class="waveForm" id="waveform"></div>
    </div>
    <div class="btn-wrapper">
      <div class="btn btn-forward fwd"></div>
      <div class="btn btn-next"></div>
    </div>
    <div class="handle"></div>
  </div>
</div>
